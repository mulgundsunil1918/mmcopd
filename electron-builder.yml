appId: com.curedesk.hms
productName: CureDesk HMS
copyright: Copyright (c) 2026 CureDesk HMS

# Forge already produces the packaged app dir at out/CureDesk HMS-win32-x64/.
# electron-builder runs in --prepackaged mode and just wraps it in NSIS.
directories:
  output: dist-installer

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false                       # show the full wizard
  perMachine: true                      # install for all users → defaults to C:\Program Files
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: CureDesk HMS
  menuCategory: CureDesk
  installerSidebar: null                # use NSIS default sidebar (no custom asset needed)
  uninstallDisplayName: CureDesk HMS ${version}
  runAfterFinish: true
  deleteAppDataOnUninstall: false       # keep clinic database safe on uninstall
  artifactName: CureDesk-HMS-Setup-${version}.${ext}
